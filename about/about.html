<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Me</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div id="about-container">
        <h1 class="brand-name about" id="aboutHeader"></h1>
        <h3 class="aboutSubHeader" id="aboutSubHeader">THAT'S ME!</h3>
        <div class="arrow-wrapper about">
            <span class="scroll-down-arrow-about"></span>
        </div>
    </div>
    <div id="camera-stage-about">
        <div id="phrase-stage-about"></div>
    </div>
    <div id="camera-stage-guess">
        <div id="phrase-stage-guess"></div>
    </div>
    <div id="formal-greeting">
        <p class="greeting-line line-1">IF YOU'VE STAYED THIS LONG,</p>
        <p class="greeting-line line-2">THEN I SHOULD PROBABLY FORMALLY INTRODUCE MYSELF</p>
        <p class="greeting-line line-3">SO...</p>
    </div>
    <div id="photo-pour-stage">
        <div class="welcome-text-track">
            <span class="welcome-word word-hi">HI!</span>
            <span class="welcome-word word-im">I'M</span>
            <span class="welcome-word word-taksh">TAKSH</span>
        </div>
        <div class="photo-grid" id="photo-grid"></div>
    </div>
    <script src="about.js"></script>
</body>
</html>
